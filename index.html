<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Family ❤️</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #ffe4ec, #ffd1dc);
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    /* 🏡 房子 */
    .house {
      width: 360px;
      height: 260px;
      background: #fff8f9;
      border-radius: 20px;
      position: relative;
      box-shadow: 0 15px 30px rgba(0,0,0,0.15);
      overflow: hidden;
    }

    /* 屋顶 */
    .roof {
      position: absolute;
      top: -60px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 200px solid transparent;
      border-right: 200px solid transparent;
      border-bottom: 80px solid #ff8fab;
    }

    /* 地板 */
    .floor {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 40px;
      background: #f3d1dc;
    }

    /* 窗户 */
    .window {
      position: absolute;
      top: 60px;
      width: 60px;
      height: 60px;
      background: #dff6ff;
      border-radius: 10px;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
    }

    .window.left { left: 40px; }
    .window.right { right: 40px; }

    /* 人物 */
    .family {
      position: absolute;
      bottom: 45px;
      width: 100%;
      display: flex;
      justify-content: space-around;
      align-items: flex-end;
    }

    .person {
      font-size: 50px;
      text-align: center;
      animation: bounce 2s infinite alternate;
    }

    .label {
      font-size: 12px;
      color: #555;
      margin-top: 4px;
    }

    @keyframes bounce {
      from { transform: translateY(0); }
      to { transform: translateY(-10px); }
    }

    /* 祝福文字 */
    .love {
      margin-top: 20px;
      font-size: 18px;
      color: #c2185b;
      text-align: center;
      font-weight: bold;
    }

  </style>
</head>

<body>

<div class="house">
  <div class="roof"></div>

  <div class="window left"></div>
  <div class="window right"></div>

  <div class="family">
    <div class="person">
      👨
      <div class="label">爸爸</div>
    </div>

    <div class="person">
      👩
      <div class="label">妈妈</div>
    </div>

    <div class="person">
      👦
      <div class="label">哥哥</div>
    </div>

    <div class="person">
      👧
      <div class="label">妹妹</div>
    </div>
  </div>

  <div class="floor"></div>
</div>

<div class="love">
  爸爸妈妈哥哥我爱你们 ❤️<br>
  祝健康快乐 🌸
</div>

</body>
</html>
