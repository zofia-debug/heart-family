<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Family ❤️</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #ffe4ec, #ffd1dc);
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      position: relative;
    }

    /* ❤️ 爱心 */
    .heart {
      position: absolute;
      color: #ff2d55;
      font-size: 30px;
      animation: float 5s linear infinite;
      opacity: 0.8;
      pointer-events: none;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.2));
    }

    @keyframes float {
      0% {
        transform: translateY(100vh) scale(1);
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh) scale(1.6);
        opacity: 0;
      }
    }

    /* 🏡 房子 */
    .house {
      width: 360px;
      height: 260px;
      background: #fff8f9;
      border-radius: 20px;
      position: relative;
      box-shadow: 0 15px 30px rgba(0,0,0,0.15);
      overflow: hidden;
      z-index: 2;
    }

    .roof {
      position: absolute;
      top: -60px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 200px solid transparent;
      border-right: 200px solid transparent;
      border-bottom: 80px solid #ff8fab;
    }

    .window {
      position: absolute;
      top: 60px;
      width: 60px;
      height: 60px;
      background: #dff6ff;
      border-radius: 10px;
    }

    .window.left { left: 40px; }
    .window.right { right: 40px; }

    .floor {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 40px;
      background: #f3d1dc;
    }

    .family {
      position: absolute;
      bottom: 45px;
      width: 100%;
      display: flex;
      justify-content: space-around;
      align-items: flex-end;
    }

    .person {
      font-size: 50px;
      text-align: center;
      animation: bounce 2s infinite alternate;
    }

    .label {
      font-size: 12px;
      color: #555;
      margin-top: 4px;
    }

    @keyframes bounce {
      from { transform: translateY(0); }
      to { transform: translateY(-10px); }
    }

    .love {
      margin-top: 20px;
      font-size: 18px;
      color: #c2185b;
      text-align: center;
      font-weight: bold;
      z-index: 2;
    }
  </style>
</head>

<body>

<!-- 🏡 房子 -->
<div class="house">
  <div class="roof"></div>

  <div class="window left"></div>
  <div class="window right"></div>

  <div class="family">
    <div class="person">👨<div class="label">爸爸</div></div>
    <div class="person">👩<div class="label">妈妈</div></div>
    <div class="person">👦<div class="label">哥哥</div></div>
    <div class="person">👧<div class="label">妹妹</div></div>
  </div>

  <div class="floor"></div>
</div>

<div class="love">
  爸爸妈妈哥哥我爱你们 ❤️<br>
  祝健康快乐 🌸
</div>

<script>
  // ❤️ 全屏爱心生成
  function createHeart() {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 20) + "px";
    heart.style.animationDuration = (Math.random() * 3 + 3) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 6000);
  }

  setInterval(createHeart, 120);
</script>

</body>
</html>
